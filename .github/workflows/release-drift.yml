name: Release Drift

on:
  schedule:
    - cron: "17 6 * * 1"
  workflow_dispatch:

jobs:
  rebuild-and-verify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Run unit tests
        run: python -m pytest

      - name: Build Python distributions
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Verify wheel install
        run: |
          python -m venv .venv-wheel
          .venv-wheel/bin/python -m pip install --upgrade pip
          .venv-wheel/bin/python -m pip install --no-deps dist/*.whl
          .venv-wheel/bin/python -c "import uniprot_cli"
          .venv-wheel/bin/uniprot-cli --help >/dev/null

      - name: Verify sdist install
        run: |
          python -m venv .venv-sdist
          .venv-sdist/bin/python -m pip install --upgrade pip setuptools wheel
          .venv-sdist/bin/python -m pip install --no-build-isolation dist/*.tar.gz
          .venv-sdist/bin/python -c "import uniprot_cli"
          .venv-sdist/bin/uniprot-cli --help >/dev/null
